<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Torwart">
<meta name="theme-color" content="#0a1628">
<title>Torwarttraining</title>
<style>
:root{
  --bg:#0a1628;--bg2:#0f1f3d;--bg3:#162848;
  --accent:#f0a500;--accent2:#e8931a;
  --text:#f0f4ff;--text2:#8fa0c0;--text3:#4a6080;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);--green-border:rgba(34,197,94,0.25);
  --radius:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(60px + var(--safe-bot))}

.app-header{position:sticky;top:0;z-index:100;background:rgba(10,22,40,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:calc(var(--safe-top) + 14px) 20px 14px}
.header-inner{display:flex;align-items:center;gap:12px;max-width:600px;margin:0 auto}
.app-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-icon svg{width:20px;height:20px}
.header-text h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-text p{font-size:12px;color:var(--text2);margin-top:1px}
.header-badge{margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;background:rgba(240,165,0,0.15);color:var(--accent);border:0.5px solid rgba(240,165,0,0.3);white-space:nowrap}

.section{padding:16px 20px 0;max-width:600px;margin:0 auto}
.progress-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.prog-grid{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;gap:8px;margin-bottom:14px}
.prog-stat{text-align:center}
.prog-num{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.prog-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.prog-div{background:var(--border)}
.bar-wrap{display:flex;align-items:center;gap:10px}
.bar-bg{flex:1;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#f5c842);transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.bar-pct{font-size:12px;font-weight:600;color:var(--accent);min-width:32px;text-align:right}

.month-scroll{display:flex;gap:8px;overflow-x:auto;padding:0 20px 12px;-webkit-overflow-scrolling:touch}
.month-scroll::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:7px 16px;border-radius:99px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.month-tab.active{background:var(--accent);border-color:var(--accent);color:#0a1628;font-weight:700}
.mdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:5px;vertical-align:2px}

.sessions{display:flex;flex-direction:column;gap:8px;padding:0 20px;max-width:600px;margin:0 auto}
.session-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color .2s}
.session-card:active{opacity:0.85}
.session-card.done{border-left:2.5px solid var(--green)}
.session-card.expanded{border-color:var(--border2)}
.session-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.snum{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--bg3);color:var(--text2)}
.snum.done{background:var(--green-bg);color:var(--green)}
.stitle{font-size:14px;font-weight:600;color:var(--text)}
.ssub{font-size:12px;color:var(--text2);margin-top:2px}
.sbadge{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;padding:4px 9px;border-radius:99px}
.bt{background:rgba(55,138,221,0.15);color:#62a8f5;border:0.5px solid rgba(55,138,221,0.25)}
.ba{background:rgba(34,197,94,0.12);color:#4ade80;border:0.5px solid rgba(34,197,94,0.2)}
.bs{background:rgba(240,165,0,0.14);color:#f5c842;border:0.5px solid rgba(240,165,0,0.25)}
.bm{background:rgba(167,139,250,0.15);color:#c4b5fd;border:0.5px solid rgba(167,139,250,0.25)}
.chev{margin-left:8px;color:var(--text3);font-size:10px;transition:transform .2s;flex-shrink:0}
.expanded .chev{transform:rotate(180deg)}

.session-detail{border-top:0.5px solid var(--border)}
.theme-hdr{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.ct{color:#62a8f5}.ca{color:#4ade80}.cs{color:#f5c842}.cm{color:#c4b5fd}

.ex-list{display:flex;flex-direction:column}
.ex-item{border-top:0.5px solid var(--border);display:flex}
.ex-vis{width:96px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg3);padding:10px}
.ex-vis svg{width:76px;height:64px}
.ex-body{padding:12px 14px;flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.ex-desc{font-size:12px;color:var(--text2);line-height:1.55}
.ex-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.ex-tag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--text3);border:0.5px solid var(--border)}

.done-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 16px 16px;padding:11px;border-radius:10px;border:0.5px solid rgba(240,165,0,0.35);background:rgba(240,165,0,0.08);color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:calc(100% - 32px)}
.done-btn.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}

.install-hint{position:fixed;bottom:calc(16px + var(--safe-bot));left:50%;transform:translateX(-50%);background:rgba(15,31,61,0.97);border:0.5px solid var(--border2);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,0.5);max-width:calc(100vw - 32px);backdrop-filter:blur(20px);z-index:200;animation:sup .35s ease}
@keyframes sup{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hint-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hint-text p{font-size:13px;font-weight:600;color:var(--text)}
.hint-text span{font-size:11px;color:var(--text2)}
.hint-close{margin-left:auto;padding:6px;color:var(--text3);cursor:pointer;font-size:16px;flex-shrink:0;background:none;border:none}
.spacer{height:24px}
</style>
</head>

    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Torwarttraining</h1>
      <p>Jugendlicher &middot; 1&times; pro Woche &middot; 45 min</p>
    </div>
    <div class="header-badge" id="badge">0 / 20</div>
  </div>
</header>

<div class="section">
  <div class="progress-card">
    <div class="prog-grid">

      <div class="prog-stat"><div class="prog-num" id="st-left">20</div><div class="prog-lbl">Verbleibend</div></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
      <span class="bar-pct" id="pct">0%</span>
    </div>
  </div>
</div>

<div class="month-scroll" id="month-nav"></div>
<div class="sessions" id="sessions"></div>
<div class="spacer"></div>

<div class="install-hint" id="hint" style="display:none">
  <div class="hint-icon">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#0a1628" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 5v10M8 15l4 4 4-4"/><path d="M5 20h14"/>
    </svg>
  </div>
  <div class="hint-text">
    <p>Zum Homebildschirm</p>
    <span>Teilen &rarr; &ldquo;Zum Home-Bildschirm&rdquo;</span>
  </div>
  <button class="hint-close" id="hint-close">&#x2715;</button>
</div>

var BADGE_CLS = {Technik:'bt',Athletik:'ba',Spielaufbau:'bs',Mental:'bm'};
var THEME_CLS  = {Technik:'ct',Athletik:'ca',Spielaufbau:'cs',Mental:'cm'};
var THEME_ICON = {Technik:'◈',Athletik:'⚡',Spielaufbau:'➤',Mental:'◎'};

var currentMonth = 1;
var expanded = null;
var done = [];
try { done = JSON.parse(localStorage.getItem('gk_v4') || '[]'); } catch(e) {}

function save() { try { localStorage.setItem('gk_v4', JSON.stringify(done)); } catch(e) {} }
function isDone(id) { return done.indexOf(id) !== -1; }
function getImg(key) { return SVGS[IMG_MAP[key] || 'catching'] || SVGS['catching']; }

function toggleDone(id) {
  if (isDone(id)) {
    done = done.filter(function(d){ return d !== id; });
  } else {
    done.push(id);
  }
  save();
  render();
}

function toggleExp(id) {
  expanded = (expanded === id) ? null : id;
  render();
}

function render() {
  var n = done.length;
  document.getElementById('badge').textContent = n + ' / 20';
  document.getElementById('st-done').textContent = n;
  document.getElementById('st-left').textContent = 20 - n;
  var pct = Math.round(n / 20 * 100);
  document.getElementById('bar').style.width = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
  var next = null;
  for (var i = 0; i < SESSIONS.length; i++) {
    if (!isDone(SESSIONS[i].id)) { next = SESSIONS[i]; break; }
  }
  document.getElementById('st-month').textContent = next ? next.m : '✓';
  document.getElementById('st-week').textContent  = next ? 'KW ' + next.w : '✓';

  // Month nav
  var nav = document.getElementById('month-nav');
  nav.innerHTML = '';
  for (var m = 1; m <= 5; m++) {
    (function(mi){
      var doneCnt = SESSIONS.filter(function(s){ return s.m === mi && isDone(s.id); }).length;
      var btn = document.createElement('button');
      btn.className = 'month-tab' + (mi === currentMonth ? ' active' : '');
      btn.innerHTML = 'Monat ' + mi + (doneCnt === 4 ? '<span class="mdot"></span>' : '');
      btn.addEventListener('click', function(){ currentMonth = mi; render(); });
      nav.appendChild(btn);
    })(m);
  }

  // Sessions
  var grid = document.getElementById('sessions');
  grid.innerHTML = '';
  var filtered = SESSIONS.filter(function(s){ return s.m === currentMonth; });
  filtered.forEach(function(s) {
    var isExp = (expanded === s.id);
    var isDn  = isDone(s.id);

    var card = document.createElement('div');
    card.className = 'session-card' + (isDn ? ' done' : '') + (isExp ? ' expanded' : '');

    // Header
    var top = document.createElement('div');
    top.className = 'session-top';
    top.innerHTML =
      '<div class="snum' + (isDn ? ' done' : '') + '">' + (isDn ? '✓' : 'W' + s.id) + '</div>' +
      '<div><div class="stitle">' + s.f + '</div><div class="ssub">' + s.th + ' · 45 Minuten · Woche ' + s.w + '</div></div>' +
      '<span class="sbadge ' + BADGE_CLS[s.th] + '">' + s.th + '</span>' +
      '<span class="chev">&#9660;</span>';
    top.addEventListener('click', function(){ toggleExp(s.id); });
    card.appendChild(top);

    // Detail (expanded)
    if (isExp) {
      var detail = document.createElement('div');
      detail.className = 'session-detail';

      var thdr = document.createElement('div');
      thdr.className = 'theme-hdr ' + THEME_CLS[s.th];
      thdr.textContent = THEME_ICON[s.th] + ' ' + s.th + ': ' + s.f;
      detail.appendChild(thdr);

      var exList = document.createElement('div');
      exList.className = 'ex-list';

      s.ex.forEach(function(ex) {
        var item = document.createElement('div');
        item.className = 'ex-item';

        var vis = document.createElement('div');
        vis.className = 'ex-vis';
        vis.innerHTML = getImg(ex.k);

        var body = document.createElement('div');
        body.className = 'ex-body';
        body.innerHTML =
          '<div class="ex-name">' + ex.n + '</div>' +
          '<div class="ex-desc">' + ex.d + '</div>' +
          '<div class="ex-tags"><span class="ex-tag">&#9201; ' + ex.t + '</span><span class="ex-tag">&#127947; ' + ex.mt + '</span></div>';

        item.appendChild(vis);
        item.appendChild(body);
        exList.appendChild(item);
      });
      detail.appendChild(exList);

      var btn = document.createElement('button');
      btn.className = 'done-btn' + (isDn ? ' ok' : '');
      btn.textContent = isDn ? '✓ Einheit abgeschlossen' : 'Einheit als erledigt markieren';
      btn.addEventListener('click', function(){ toggleDone(s.id); });
      detail.appendChild(btn);

      card.appendChild(detail);
    }

    grid.appendChild(card);
  });
}

// Install hint
document.getElementById('hint-close').addEventListener('click', function(){
  document.getElementById('hint').style.display = 'none';
});
setTimeout(function(){
  try {
    var isInBrowser = (window.navigator.standalone === false) ||
                      window.matchMedia('(display-mode: browser)').matches;
    if (isInBrowser) {
      document.getElementById('hint').style.display = 'flex';
      setTimeout(function(){
        var h = document.getElementById('hint');
        if (h) h.style.display = 'none';
      }, 8000);
    }
  } catch(e) {}
}, 1500);

render();
</script>
